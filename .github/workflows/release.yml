name: Release plugin

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version from plugin files
        id: version
        run: |
          version=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Package plugin
        run: |
          mkdir -p dist
          zip -r "dist/timely-skill.skill" \
            .claude-plugin/ skills/ LICENSE-* README.md \
            -x '*/evals/*' '*/__pycache__/*' '*/.DS_Store'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/*.skill
          generate_release_notes: true
